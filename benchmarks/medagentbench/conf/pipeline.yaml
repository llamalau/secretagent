# L3 Read-Act: two-phase text loop using medagent_loop with restricted actions.
# Stage 1 (Read): GET + FINISH only — gather FHIR data (max 4 rounds)
# Stage 2 (Act): GET + POST + FINISH — execute actions with read data (max 4 rounds)
# Fallback: full loop if read phase finds nothing (pure write tasks)
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 2048

cachier:
  enable_caching: false

fhir:
  api_base: "http://localhost:8080/fhir/"
  max_round: 8

evaluate:
  result_dir: results
  expt_name: read_act
  record_details: false
  max_workers: 10

dataset:
  version: v2

ptools:
  solve_medical_task:
    method: direct
    fn: ptools.read_act_workflow
