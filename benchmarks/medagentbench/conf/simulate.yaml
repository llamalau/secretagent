# Simulate: LLM predicts the answer from the docstring alone (no FHIR access).
# Tests how much the LLM can infer without actually querying the FHIR server.
# Expected to fail on most tasks since patient data is only available via the API.
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1
  max_tokens: 2048

cachier:
  enable_caching: false

fhir:
  api_base: "http://localhost:8080/fhir/"

evaluate:
  result_dir: results
  expt_name: simulate
  record_details: true

dataset:
  version: v2

ptools:
  solve_medical_task:
    method: simulate
